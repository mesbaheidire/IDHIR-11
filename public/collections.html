<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="theme-color" content="#673AB7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>المنشورات التجميعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/modern-theme.css">
    <style>
        .header { background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 50%, #5B21B6 100%); padding: 65px 20px 45px; text-align: center; position: relative; overflow: hidden; }
        .header::before { content: ''; position: absolute; top: -40%; left: -20%; width: 250px; height: 250px; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); border-radius: 50%; }
        .header::after { content: ''; position: absolute; bottom: -55%; left: -10%; right: -10%; height: 75%; background: var(--bg-primary); border-radius: 50% 50% 0 0; }
        .header > * { position: relative; z-index: 2; }
        .header h1 { font-size: 24px; font-weight: 800; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .header p { opacity: 0.85; font-size: 14px; }
        .back-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); width: 40px; height: 40px; color: #fff; font-size: 18px; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); transition: all var(--transition-fast); z-index: 3; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .content { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        .add-product-section { background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; border: 1px solid var(--border-subtle); }
        .add-product-section h3 { color: var(--accent-purple); margin-bottom: 15px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-group input { flex: 1; padding: 12px 15px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-subtle); background: var(--bg-input); color: var(--text-primary); font-family: 'Cairo', sans-serif; font-size: 14px; transition: all var(--transition-fast); }
        .input-group input:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-purple-glow); }
        .add-btn { background: linear-gradient(135deg, #7C3AED, #6D28D9); border: none; border-radius: var(--radius-sm); padding: 12px 20px; color: #fff; font-family: 'Cairo', sans-serif; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all var(--transition-fast); }
        .add-btn:hover { transform: translateY(-1px); }
        .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .products-list { margin-bottom: 20px; }
        .section-title { font-size: 16px; font-weight: 700; margin: 20px 0 15px; color: var(--accent-purple); display: flex; align-items: center; gap: 10px; }
        .section-title .count { background: linear-gradient(135deg, #7C3AED, #6D28D9); padding: 2px 10px; border-radius: 15px; font-size: 12px; }
        
        .product-item { background: var(--bg-card); border-radius: var(--radius-md); padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border-subtle); transition: all var(--transition-normal); }
        .product-item:hover { border-color: rgba(255,255,255,0.1); }
        .product-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .product-item .info { flex: 1; position: relative; }
        .product-item .title-container { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
        .product-item .title { font-size: 13px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
        .product-item .refine-btn { background: linear-gradient(135deg, #7C3AED, #6D28D9); border: none; border-radius: 5px; width: 28px; height: 28px; color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .product-item .refine-btn:disabled { opacity: 0.5; }
        .product-item .price { color: var(--accent-green); font-weight: 700; font-size: 14px; }
        .product-item .remove-btn { background: linear-gradient(135deg, #EF4444, #DC2626); border: none; border-radius: 8px; width: 35px; height: 35px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast); }
        .product-item .remove-btn:hover { transform: scale(1.05); }
        
        .empty-list { text-align: center; padding: 40px; color: var(--text-muted); }
        .empty-list i { font-size: 50px; margin-bottom: 15px; opacity: 0.15; }
        
        .generate-section { background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border-subtle); }
        .generate-section h3 { color: var(--accent-purple); margin-bottom: 15px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 13px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 15px; border-radius: var(--radius-sm); border: 1.5px solid var(--border-subtle); background: var(--bg-input); color: var(--text-primary); font-family: 'Cairo', sans-serif; font-size: 14px; transition: all var(--transition-fast); }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-purple-glow); }
        
        .preview-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 15px; margin: 15px 0; border: 1px solid var(--border-subtle); }
        .preview-title { color: var(--text-secondary); font-size: 12px; margin-bottom: 10px; text-align: center; }
        .preview-content { white-space: pre-wrap; font-size: 12px; line-height: 1.8; direction: rtl; }
        
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .action-btn { padding: 15px; border: none; border-radius: var(--radius-md); color: #fff; font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all var(--transition-fast); position: relative; overflow: hidden; }
        .action-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%); pointer-events: none; }
        .action-btn:hover { transform: translateY(-1px); }
        .publish-btn { background: linear-gradient(135deg, #2AABEE, #229ED9); box-shadow: var(--shadow-glow-blue); }
        .copy-btn { background: linear-gradient(135deg, #10B981, #059669); }
        .clear-btn { background: linear-gradient(135deg, #EF4444, #DC2626); grid-column: span 2; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(30,30,50,0.9); color: #fff; padding: 14px 28px; border-radius: 16px; display: none; z-index: 2000; font-weight: 600; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); box-shadow: var(--shadow-lg); }
        .toast.show { display: block; animation: fadeInOut 3s ease-in-out; }
        .toast.success { background: rgba(16,185,129,0.9); }
        .toast.error { background: rgba(239,68,68,0.9); }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <h1><i class="fas fa-layer-group"></i> المنشورات التجميعية</h1>
        <p>اجمع عدة منتجات في منشور واحد</p>
    </div>

    <div class="content">
        <div class="add-product-section">
            <h3><i class="fas fa-plus-circle"></i> إضافة منتج</h3>
            <div class="input-group">
                <input type="text" id="productUrl" placeholder="الصق رابط منتج AliExpress...">
                <button class="add-btn" id="addProductBtn"><i class="fas fa-plus"></i> إضافة</button>
            </div>
            <div id="addingStatus" style="display: none; text-align: center; color: #673AB7;"><i class="fas fa-spinner fa-spin"></i> جاري جلب المنتج...</div>
        </div>

        <div class="section-title">
            <i class="fas fa-box"></i> المنتجات المختارة
            <span class="count" id="productCount">0</span>
        </div>

        <div class="products-list" id="productsList">
            <div class="empty-list" id="emptyList">
                <i class="fas fa-inbox"></i>
                <p>لم تقم بإضافة أي منتجات بعد</p>
            </div>
        </div>

        <div class="generate-section">
            <h3><i class="fas fa-edit"></i> إعدادات المنشور</h3>
            
            <div class="form-group">
                <label>عنوان المجموعة:</label>
                <input type="text" id="collectionTitle" placeholder="مثال: أفضل 5 سماعات بلوتوث 🎧">
            </div>
            
            <div class="form-group">
                <label>نص إضافي (اختياري):</label>
                <textarea id="extraText" placeholder="أضف وصفاً أو ملاحظات..."></textarea>
            </div>
            
            <div class="form-group">
                <label>صورة المجموعة (اختياري):</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="collectionImageUrl" placeholder="رابط الصورة https://..." style="flex: 1;">
                    <label for="collectionImageUpload" style="margin: 0; cursor: pointer; background: #1a1a2e; border: 2px solid #2d2d44; border-radius: 10px; padding: 12px 20px; display: flex; align-items: center; justify-content: center; transition: all 0.3s;">
                        <i class="fas fa-upload" style="color: #673AB7; font-size: 20px;"></i>
                        <input type="file" id="collectionImageUpload" accept="image/*" style="display: none;">
                    </label>
                </div>
                <img id="collectionImagePreview" style="width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none;">
                <input type="hidden" id="collectionImageData">
            </div>
            
            <div class="form-group">
                <label>القناة المستهدفة:</label>
                <select id="channelSelect">
                    <option value="1">القناة الأولى</option>
                    <option value="2">القناة الثانية</option>
                    <option value="both">كلا القناتين</option>
                </select>
            </div>

            <div class="preview-card">
                <div class="preview-title">معاينة المنشور (قابلة للتعديل)</div>
                <textarea id="previewContent" style="width: 100%; min-height: 200px; background: transparent; border: none; color: #fff; font-family: inherit; font-size: 12px; line-height: 1.8; direction: rtl; resize: vertical; padding: 0; outline: none;" spellcheck="false">أضف منتجات لمعاينة المنشور...</textarea>
            </div>

            <div class="action-buttons">
                <button class="action-btn publish-btn" id="publishBtn" disabled>
                    <i class="fab fa-telegram"></i> نشر
                </button>
                <button class="action-btn copy-btn" id="copyBtn" disabled>
                    <i class="fas fa-copy"></i> نسخ
                </button>
                <button class="action-btn clear-btn" id="clearBtn">
                    <i class="fas fa-trash"></i> مسح الكل
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const defaultSettings = {
            prefix: '📢تخفيض لـ',
            salePrice: '✅السعر بعد التخفيض:',
            linkText: '📌رابط الشراء :',
            couponText: '🎁كوبون:',
            footer: '⚠️ لا تنس استخدام البوت الرسمي لـ AffiliDz للحصول على أفضل العروض والتخفيضات من AliExpress 👇',
            botLink: '@AffiliDz_bot',
            hashtags: '#Aliexpress #Offers',
            telegramToken: '',
            channelId: '',
            channelId2: '@AffiliDz'
        };
        let settings = JSON.parse(localStorage.getItem('appSettings')) || { ...defaultSettings };
        
        let products = JSON.parse(localStorage.getItem('collectionProducts')) || [];
        
        const productUrl = document.getElementById('productUrl');
        const addProductBtn = document.getElementById('addProductBtn');
        const addingStatus = document.getElementById('addingStatus');
        const productsList = document.getElementById('productsList');
        const emptyList = document.getElementById('emptyList');
        const productCount = document.getElementById('productCount');
        const collectionTitle = document.getElementById('collectionTitle');
        const extraText = document.getElementById('extraText');
        const collectionImageUrl = document.getElementById('collectionImageUrl');
        const collectionImageUpload = document.getElementById('collectionImageUpload');
        const collectionImagePreview = document.getElementById('collectionImagePreview');
        const collectionImageData = document.getElementById('collectionImageData');
        const channelSelect = document.getElementById('channelSelect');
        const previewContent = document.getElementById('previewContent');
        const publishBtn = document.getElementById('publishBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const toast = document.getElementById('toast');

        function showToast(msg, type = '') {
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function saveProducts() {
            localStorage.setItem('collectionProducts', JSON.stringify(products));
        }

        function renderProducts() {
            productCount.textContent = products.length;
            publishBtn.disabled = products.length === 0;
            copyBtn.disabled = products.length === 0;
            
            if (products.length === 0) {
                productsList.innerHTML = '<div class="empty-list"><i class="fas fa-inbox"></i><p>لم تقم بإضافة أي منتجات بعد</p></div>';
                return;
            }
            
            productsList.innerHTML = products.map((p, i) => `
                <div class="product-item">
                    <img src="${p.image}" alt="">
                    <div class="info">
                        <div class="title-container">
                            <div class="title" id="title-${i}">${p.title}</div>
                            <button class="refine-btn" onclick="refineProductTitle(${i}, this)" title="تحسين العنوان"><i class="fas fa-magic"></i></button>
                        </div>
                        <div class="price">${p.price}</div>
                    </div>
                    <button class="remove-btn" onclick="removeProduct(${i})"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
            
            updatePreview();
        }

        function removeProduct(index) {
            products.splice(index, 1);
            saveProducts();
            renderProducts();
        }

        async function refineProductTitle(index, btn) {
            const product = products[index];
            const originalIcon = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const res = await fetch('/api/ai-refine-title', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: product.title })
                });
                const data = await res.json();
                if (data.success) {
                    products[index].title = data.refinedTitle;
                    saveProducts();
                    renderProducts();
                    showToast('تم تحسين العنوان ✅', 'success');
                } else {
                    showToast('فشل تحسين العنوان', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalIcon;
            }
        }

        function generateMessage() {
            const s = settings;
            const title = collectionTitle.value || '🔥 عروض مميزة';
            const extra = extraText.value;
            
            let message = `${title}\n\n`;
            
            products.forEach((p, i) => {
                message += `${i + 1}. ${p.title}\n`;
                message += `   💰 ${p.price}\n`;
                message += `   🔗 ${p.link}\n\n`;
            });
            
            if (extra) message += `${extra}\n\n`;
            message += `${s.footer}\n🔗 ${s.botLink}\n\n${s.hashtags}`;
            
            return message;
        }

        function updatePreview() {
            if (products.length === 0) {
                previewContent.value = 'أضف منتجات لمعاينة المنشور...';
                return;
            }
            previewContent.value = generateMessage();
            autoResizePreview();
        }

        function autoResizePreview() {
            previewContent.style.height = 'auto';
            previewContent.style.height = (previewContent.scrollHeight) + 'px';
        }

        previewContent.oninput = autoResizePreview;

        addProductBtn.onclick = async () => {
            const url = productUrl.value.trim();
            if (!url) {
                showToast('الرجاء إدخال رابط المنتج', 'error');
                return;
            }
            
            addProductBtn.disabled = true;
            addingStatus.style.display = 'block';
            
            try {
                const res = await fetch('/api/affiliate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        url: url,
                        credentials: {
                            cook: settings.cook || '',
                            appKey: settings.appKey || '',
                            appSecret: settings.appSecret || ''
                        }
                    })
                });
                
                const data = await res.json();
                if (data.success && data.data) {
                    const product = data.data;
                    products.push({
                        title: product.title || 'منتج',
                        price: `${product.price} ${product.currency || ''}`,
                        image: product.image || '',
                        link: url,
                        originalUrl: url
                    });
                    saveProducts();
                    renderProducts();
                    productUrl.value = '';
                    showToast('تمت إضافة المنتج ✅', 'success');
                } else {
                    showToast(data.error || 'فشل في جلب المنتج', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
            } finally {
                addProductBtn.disabled = false;
                addingStatus.style.display = 'none';
            }
        };

        collectionTitle.oninput = updatePreview;
        extraText.oninput = updatePreview;

        collectionImageUrl.oninput = () => {
            const url = collectionImageUrl.value.trim();
            if (url) {
                collectionImagePreview.src = url;
                collectionImagePreview.style.display = 'block';
                collectionImageData.value = '';
            } else {
                collectionImagePreview.style.display = 'none';
            }
        };

        collectionImageUpload.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64Image = event.target.result;
                    collectionImagePreview.src = base64Image;
                    collectionImagePreview.style.display = 'block';
                    collectionImageUrl.value = 'صورة محملة يدوياً';
                    collectionImageData.value = base64Image;
                };
                reader.readAsDataURL(file);
            }
        };

        publishBtn.onclick = async () => {
            if (products.length === 0) return;
            
            publishBtn.disabled = true;
            publishBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري النشر...';
            
            try {
                const credentials = {
                    telegramToken: settings.telegramToken || '',
                    channelId: settings.channelId || '',
                    channelId2: settings.channelId2 || '@AffiliDz',
                    channelChoice: channelSelect.value || 'both'
                };
                
                const imageToSend = collectionImageData.value || (collectionImageUrl.value !== 'صورة محملة يدوياً' ? collectionImageUrl.value : null);
                
                const res = await fetch('/api/publish-collection', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: previewContent.value,
                        image: imageToSend,
                        credentials: credentials
                    })
                });
                
                const result = await res.json();
                if (result.success) {
                    showToast('تم النشر بنجاح! ✅', 'success');
                } else {
                    showToast(result.error || 'فشل النشر', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
            } finally {
                publishBtn.disabled = false;
                publishBtn.innerHTML = '<i class="fab fa-telegram"></i> نشر';
            }
        };

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(previewContent.value).then(() => {
                showToast('تم نسخ المنشور ✅', 'success');
            });
        };

        clearBtn.onclick = () => {
            if (confirm('هل تريد مسح جميع المنتجات؟')) {
                products = [];
                saveProducts();
                renderProducts();
                showToast('تم مسح القائمة', 'success');
            }
        };

        renderProducts();
    </script>
</body>
</html>
