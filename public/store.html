<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AliOffers DZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pri:#7B2FBE;--pri2:#6225A7;--pri-dark:#4A1A8A;
  --pri-light:#F0EBF8;--pri-pale:#F7F5FA;
  --acc:#50B83C;--acc2:#3D8F2F;
  --bg:#F5F3F7;--card:#fff;
  --text:#1A1A2E;--muted:#8E8E93;--border:#ECEAF0;
  --green:#50B83C;--red:#E53935;
  --shadow:0 2px 16px rgba(123,47,190,.08);
  --radius:16px;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:30px}

/* ===== HEADER ===== */
.header{
  background:#fff;
  padding:14px 14px 0;
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 8px rgba(61,21,96,.06);
}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-icon{
  width:38px;height:38px;
  border-radius:50%;flex-shrink:0;
  overflow:hidden;
}
.logo-icon img{width:100%;height:100%;object-fit:cover}
.logo-text{font-size:15px;font-weight:900;color:var(--pri);white-space:nowrap}
.logo-text span{color:var(--pri2)}
.search-bar{
  flex:1;display:flex;align-items:center;
  background:var(--pri-pale);
  border:1.5px solid var(--border);
  border-radius:25px;height:42px;overflow:hidden;
}
.search-bar input{
  flex:1;border:none;outline:none;background:transparent;
  padding:0 12px;font-family:'Cairo',sans-serif;font-size:13px;
  color:var(--text);direction:rtl;
}
.search-bar input::placeholder{color:#B8B5C0}
.search-bar .s-btn{
  background:var(--pri);border:none;
  width:44px;height:100%;color:#fff;
  cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.cam-btn{
  background:transparent;border:none;
  padding:0 10px;height:100%;
  color:var(--pri2);cursor:pointer;font-size:15px;
  border-right:1px solid var(--border);
  display:flex;align-items:center;flex-shrink:0;
}

/* COUPONS ENTRY (home) */
.coupons-entry{
  position:relative;
  margin:14px;padding:14px 16px;
  background:linear-gradient(135deg,#fee2e2,#fef3c7);
  border:1.5px dashed #ef4444;border-radius:16px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:transform .15s;
  animation:couponPulse 2s ease-in-out infinite;
}
.coupons-entry:active{transform:scale(.98);animation:none}
.ce-icon{font-size:32px;line-height:1;animation:couponWiggle 2s ease-in-out infinite}
.ce-text{flex:1;min-width:0}
.ce-title{font-size:15px;font-weight:900;color:#991b1b}
.ce-sub{font-size:11px;color:#7f1d1d;margin-top:2px;opacity:.85}
.ce-arrow{color:#991b1b;font-size:14px}

/* Pulse animation: نبض الظل لجذب الانتباه */
@keyframes couponPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.55),0 4px 14px rgba(239,68,68,.18)}
  50%{box-shadow:0 0 0 10px rgba(239,68,68,0),0 8px 22px rgba(239,68,68,.35)}
}
/* اهتزاز خفيف للأيقونة */
@keyframes couponWiggle{
  0%,100%{transform:rotate(0)}
  20%{transform:rotate(-8deg) scale(1.05)}
  40%{transform:rotate(8deg) scale(1.05)}
  60%{transform:rotate(-4deg)}
  80%{transform:rotate(4deg)}
}
/* نبض داخل تفاصيل المنتج */
@keyframes couponBoxPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.45)}
  50%{box-shadow:0 0 0 8px rgba(124,58,237,0)}
}
.coupon-box{animation:couponBoxPulse 1.8s ease-in-out infinite}
/* احترام تفضيلات المستخدم لتقليل الحركة */
@media (prefers-reduced-motion: reduce){
  .coupons-entry,.ce-icon,.coupon-box{animation:none !important}
}

/* COUPONS PAGE - AliExpress style */
.coup-hero{
  background:linear-gradient(180deg,#d1fae5,#ecfdf5);
  padding:14px 14px 18px;
  position:relative;
}
.coup-hero-top{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;
}
.coup-hero-title{font-size:18px;font-weight:900;color:#064e3b}
.coup-back{
  background:#fff;border:none;width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:#064e3b;font-size:14px;
}
.coup-countdown{
  font-size:12px;font-weight:700;color:#065f46;text-align:center;margin:8px 0 14px;
}
.coup-countdown b{color:#dc2626;margin:0 4px}
.coup-mega-scroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:0 2px 4px}
.coup-mega-scroll::-webkit-scrollbar{display:none}
.coup-mega{
  flex-shrink:0;background:#fff;border-radius:10px;
  padding:10px 9px 8px;min-width:104px;text-align:center;
  border:1px solid #fee2e2;position:relative;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
  display:flex;flex-direction:column;align-items:stretch;
}
.coup-mega-amt{font-size:11px;color:#dc2626;font-weight:700;letter-spacing:.3px}
.coup-mega-amt b{font-size:17px;font-weight:900;letter-spacing:0}
.coup-mega-amt span{font-size:11px;font-weight:700}
.coup-mega-cond{font-size:9.5px;color:#fca5a5;margin-top:4px;font-weight:600}
.coup-mega-code{
  font-size:12px;font-weight:900;color:#374151;
  letter-spacing:1px;margin:6px 0 7px;direction:ltr;
  padding-top:6px;border-top:1px dashed #fde68a;
}
.coup-mega-btn{
  background:#dc2626;border:none;color:#fff;
  border-radius:18px;padding:6px 0;
  font-size:11px;font-weight:800;font-family:'Cairo',sans-serif;cursor:pointer;
  width:100%;
}
.coup-mega-btn:active{transform:scale(.97)}

.coup-section-title{
  text-align:center;font-size:16px;font-weight:900;
  margin:18px 0 12px;color:#1f2937;
}
.coup-tabs{
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
  padding:0 14px 14px;
}
.coup-tabs::-webkit-scrollbar{display:none}
.coup-tab{
  flex-shrink:0;border:1px solid #e5e7eb;background:#f3f4f6;
  border-radius:20px;padding:7px 16px;font-size:12px;font-weight:700;
  color:#4b5563;font-family:'Cairo',sans-serif;cursor:pointer;
  white-space:nowrap;transition:all .2s;
}
.coup-tab.active{background:#dc2626;border-color:#dc2626;color:#fff}

.coup-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
  padding:0 10px;
}
.coup-item{
  background:#fff;border-radius:10px;overflow:hidden;
  cursor:pointer;display:flex;flex-direction:column;
  border:1px solid #f3f4f6;
}
.coup-item:active{transform:scale(.97)}
.coup-item-imgwrap{
  position:relative;width:100%;padding-top:100%;
  background:#f9fafb;overflow:hidden;
}
.coup-item-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
}
.coup-item-price{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.55);color:#fff;
  font-size:11px;font-weight:700;padding:3px 6px;
  text-align:right;
}
.coup-item-store{
  font-size:10px;color:#6b7280;padding:6px 8px 2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:3px;
}
.coup-item-store i{font-size:8px;opacity:.6}
.coup-item-disc{
  padding:2px 8px 6px;font-size:13px;font-weight:900;color:#dc2626;
  display:flex;align-items:baseline;gap:3px;
}
.coup-item-disc small{font-size:9px;font-weight:700;color:#dc2626;opacity:.85}
.coup-item-cond{
  font-size:9px;color:#9ca3af;padding:0 8px 6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.coup-item-btn{
  margin:4px 8px 8px;background:#fee2e2;color:#dc2626;
  border:none;border-radius:14px;padding:5px 8px;
  font-size:10px;font-weight:700;font-family:'Cairo',sans-serif;
  cursor:pointer;
}
.coup-item-btn:active{background:#dc2626;color:#fff}
.skel-coup{aspect-ratio:1/1.6;border-radius:10px}

/* Coupon admin */
.coup-fab{
  position:fixed;bottom:20px;left:20px;z-index:50;
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,#dc2626,#991b1b);
  color:#fff;border:none;font-size:22px;cursor:pointer;
  box-shadow:0 6px 20px rgba(220,38,38,.4);
  display:none;align-items:center;justify-content:center;
}
.coup-fab.show{display:flex}
.coup-modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;
  display:none;align-items:center;justify-content:center;padding:14px;
}
.coup-modal-bg.show{display:flex}
.coup-modal{
  background:#fff;border-radius:18px;width:100%;max-width:440px;
  max-height:90vh;overflow-y:auto;padding:20px;
}
.coup-modal h3{margin:0 0 14px;font-size:17px;color:#1f2937;display:flex;align-items:center;gap:8px}
.coup-modal h3 i{color:#dc2626}
.cm-row{margin-bottom:12px}
.cm-row label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:5px}
.cm-row input,.cm-row select,.cm-row textarea{
  width:100%;border:1.5px solid #e5e7eb;border-radius:10px;
  padding:9px 11px;font-family:'Cairo',sans-serif;font-size:13px;
  outline:none;transition:border .15s;
}
.cm-row input:focus,.cm-row select:focus,.cm-row textarea:focus{border-color:#dc2626}
.cm-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cm-check{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#374151;cursor:pointer}
.cm-check input{width:auto}
.cm-actions{display:flex;gap:8px;margin-top:8px}
.cm-btn{flex:1;border:none;border-radius:10px;padding:11px;font-family:'Cairo',sans-serif;font-weight:800;font-size:13px;cursor:pointer}
.cm-btn-primary{background:#dc2626;color:#fff}
.cm-btn-cancel{background:#f3f4f6;color:#374151}
.cm-btn-del{background:#fee2e2;color:#dc2626;flex:0 0 auto;padding:11px 14px}
.coup-item-admin{
  position:absolute;top:4px;right:4px;z-index:2;
  background:rgba(255,255,255,.95);border:none;border-radius:50%;
  width:24px;height:24px;font-size:11px;cursor:pointer;
  display:none;align-items:center;justify-content:center;color:#dc2626;
}
.admin-mode .coup-item-admin{display:flex}
.coup-mega-admin{
  position:absolute;top:2px;right:2px;background:#dc2626;color:#fff;
  border:none;border-radius:50%;width:18px;height:18px;font-size:9px;
  cursor:pointer;display:none;
}
.admin-mode .coup-mega-admin{display:block}

/* ===== HOME PAGE ===== */
.page{display:none}
.page.active{display:block}

/* Hero */
.hero{
  margin:14px 14px 0;
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  border-radius:var(--radius);
  padding:22px 18px;
  display:flex;justify-content:space-between;align-items:center;
  overflow:hidden;position:relative;
}
.hero::before{
  content:'';position:absolute;
  width:140px;height:140px;
  background:rgba(255,255,255,.06);
  border-radius:50%;right:-30px;top:-40px;
}
.hero::after{
  content:'';position:absolute;
  width:80px;height:80px;
  background:rgba(255,255,255,.04);
  border-radius:50%;left:20px;bottom:-30px;
}
.hero-left{z-index:1}
.hero-title{font-size:18px;font-weight:900;color:#fff;line-height:1.3}
.hero-sub{font-size:12px;color:rgba(255,255,255,.75);margin-top:4px}
.hero-btn{
  margin-top:12px;background:#fff;border:none;
  border-radius:22px;padding:8px 18px;
  color:var(--pri);font-family:'Cairo',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;gap:4px;
}
.hero-emoji{font-size:52px;z-index:1;line-height:1}

/* Section */
.sec{margin-top:18px}
.sec-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 14px;margin-bottom:10px;
}
.sec-title{font-size:14px;font-weight:900;display:flex;align-items:center;gap:6px}
.sec-title i{color:var(--pri2)}
.sec-badge{
  background:var(--pri-light);color:var(--pri2);
  font-size:11px;font-weight:700;padding:3px 12px;
  border-radius:20px;border:1px solid rgba(107,33,168,.1);
}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px}

/* Product Card */
.pcard{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);
  overflow:hidden;cursor:pointer;
  transition:transform .15s, box-shadow .15s;
  display:flex;flex-direction:column;
  position:relative;
}
.pcard:active{transform:scale(.97);box-shadow:var(--shadow)}
.pcard-img-wrap{
  position:relative;width:100%;padding-top:95%;
  background:var(--pri-pale);overflow:hidden;
}
.pcard-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;transition:transform .3s;
}
.pcard:active .pcard-img{transform:scale(1.04)}
.no-img{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;color:#D5D0DE;font-size:11px;
}
.no-img i{font-size:30px}
.badge-disc{
  position:absolute;top:8px;right:8px;
  background:var(--red);color:#fff;
  font-size:10px;font-weight:900;
  padding:3px 8px;border-radius:8px;
}
.badge-top{
  position:absolute;top:8px;left:8px;
  background:var(--acc);
  color:#fff;font-size:9px;font-weight:900;
  padding:3px 8px;border-radius:8px;
}
.pcard-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:5px}
.pcard-title{
  font-size:12px;color:var(--text);font-weight:600;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;line-height:1.5;
  min-height:36px;
}
.pcard-price{margin-top:2px}
.pcard-buy{margin-top:auto !important}
.pcard-price{font-size:18px;font-weight:900;color:var(--pri)}
.pcard-price .cur{font-size:11px;font-weight:600;color:var(--pri2)}
.pcard-dzd{display:none}
.pcard-orig{font-size:11px;color:var(--muted);text-decoration:line-through}
.pcard-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pcard-stars{color:#F5A623;font-size:10px}
.pcard-orders{font-size:10px;color:var(--muted)}
.pcard-buy{
  width:100%;background:var(--pri);
  border:none;border-radius:10px;padding:8px 6px;
  color:#fff;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:4px;
  white-space:nowrap;line-height:1.2;
}
.pcard-buy i{font-size:11px;flex-shrink:0}
.pcard-buy:active{opacity:.85}

/* ===== SEARCH PAGE ===== */
.search-filters{
  display:flex;gap:8px;padding:10px 14px;
  overflow-x:auto;scrollbar-width:none;
  background:#fff;border-bottom:1px solid var(--border);
}
.search-filters::-webkit-scrollbar{display:none}
.flt{
  flex-shrink:0;border:1.5px solid var(--border);
  border-radius:10px;padding:6px 14px;
  font-size:11px;font-weight:700;font-family:'Cairo',sans-serif;
  color:var(--muted);background:#fff;cursor:pointer;
  display:flex;align-items:center;gap:4px;
}
.flt.on{background:var(--pri-light);border-color:var(--pri2);color:var(--pri)}
.search-info{
  padding:8px 14px;font-size:12px;color:var(--muted);
  background:#fff;border-bottom:1px solid var(--border);
  display:none;
}
.search-info.show{display:flex;align-items:center;gap:6px}
.search-info i{color:var(--pri2)}

/* ===== STATES ===== */
.loading-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;padding:14px;
}
.skel{
  background:linear-gradient(90deg,#F0ECF5 25%,#E8E3EE 50%,#F0ECF5 75%);
  background-size:200% 100%;
  animation:shimmer 1.3s infinite;
  border-radius:var(--radius);
}
.skel-card{height:250px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty-state{
  text-align:center;padding:50px 20px;color:var(--muted);
}
.empty-state i{font-size:50px;display:block;margin-bottom:12px;opacity:.2;color:var(--pri2)}
.empty-state h3{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--text)}
.empty-state p{font-size:13px}

/* ===== LOAD MORE ===== */
.load-more{
  margin:16px 14px 0;
  width:calc(100% - 28px);
  background:#fff;
  border:2px solid var(--pri);
  border-radius:25px;padding:10px;
  color:var(--pri);font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
  display:none;align-items:center;justify-content:center;gap:6px;
}
.load-more.show{display:flex}

/* ===== DETAIL MODAL ===== */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(42,14,67,.55);z-index:200;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(3px);
}
.overlay.show{display:flex}
.det{
  background:#fff;border-radius:24px 24px 0 0;
  width:100%;max-height:90vh;overflow-y:auto;
  padding:6px 16px 34px;
  animation:up .28s ease;
}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.det-handle-row{display:flex;align-items:center;justify-content:center;position:relative;margin:10px 0 14px}
.det-handle{width:38px;height:4px;background:#DDD8E4;border-radius:2px}
.det-close-btn{position:absolute;left:0;top:50%;transform:translateY(-50%);background:var(--pri-pale);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--pri);font-size:16px}
.det-img{
  width:100%;height:230px;object-fit:contain;
  border-radius:14px;background:var(--pri-pale);margin-bottom:14px;
}
.det-title{font-size:14px;font-weight:700;line-height:1.55;margin-bottom:12px}
.price-row{margin-bottom:12px}
.det-price{font-size:26px;font-weight:900;color:var(--pri)}
.det-price .cur{font-size:14px;font-weight:600;color:var(--pri2)}
.det-dzd{display:none}
.det-orig{font-size:12px;color:var(--muted);text-decoration:line-through;margin-top:2px}
.det-coupon{margin:10px 0}
.coupon-box{display:flex;align-items:center;gap:10px;background:var(--pri-light);border:1.5px dashed var(--pri2);border-radius:12px;padding:10px 14px}
.coupon-box>i{color:var(--pri);font-size:20px}
.coupon-info{flex:1}
.coupon-label{font-size:10px;color:var(--muted);font-weight:600}
.coupon-code{font-size:15px;font-weight:800;color:var(--pri);letter-spacing:1px}
.coupon-copy{background:var(--pri);border:none;border-radius:8px;width:34px;height:34px;color:#fff;font-size:14px;cursor:pointer}
.coupon-copy:active{transform:scale(0.9)}
.det-message{margin:10px 0}
.message-box{background:var(--pri-pale);border-radius:12px;padding:12px 14px;border:1px solid var(--border)}
.message-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px}
.message-label i{color:var(--pri2);margin-left:4px}
.message-text{font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap;max-height:120px;overflow-y:auto}
.det-stats{
  display:flex;border:1px solid var(--border);
  border-radius:14px;overflow:hidden;margin-bottom:14px;
}
.det-stat{
  flex:1;text-align:center;padding:10px 4px;
  border-left:1px solid var(--border);
}
.det-stat:last-child{border-left:none}
.det-stat-val{font-size:14px;font-weight:900;color:var(--text)}
.det-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.det-stat-icon{font-size:12px;color:var(--pri2);margin-bottom:2px}
.det-shop{

    <img class="popup-ad-img" id="popupAdImg" src="" alt="عرض" onclick="clickPopupAd()">
    <div class="popup-ad-hint"><i class="fas fa-hand-pointer"></i> اضغط على الصورة للانتقال للعرض</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();try{tg.setHeaderColor('#ffffff')}catch(e){}}

const DZD=137;
let curProduct=null,curSort='orders',curCat='',curPage=1,curQ='',curProducts=[],hasMore=false,isLoading=false,imgData='',priceFltOpen=false;
const tgUserId=tg?.initDataUnsafe?.user?.id||'anon';
function track(type,detail){fetch('/api/store/track',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type,detail,userId:String(tgUserId)})}).catch(()=>{});}
track('visit','store_open');

// ===== POPUP AD =====
let popupAdCfg=null;
async function initPopupAd(){
  try{
    const r=await fetch('/api/store/popup-config');
    const d=await r.json();
    if(!d.success||!d.config||!d.config.enabled||!d.config.imageUrl)return;
    popupAdCfg=d.config;
    if(popupAdCfg.showOnce){
      const seen=localStorage.getItem('popupAdSeen');
      if(seen)return;
    }
    const delay=Math.max(0,(parseInt(popupAdCfg.delaySeconds)||3))*1000;
    setTimeout(showPopupAd,delay);
  }catch(e){}
}
function showPopupAd(){
  if(!popupAdCfg||!popupAdCfg.imageUrl)return;
  document.getElementById('popupAdImg').src=popupAdCfg.imageUrl;
  document.getElementById('popupAdOverlay').classList.add('show');
  track('popup_view',popupAdCfg.targetUrl||'');
  if(popupAdCfg.showOnce)localStorage.setItem('popupAdSeen','1');
}
function closePopupAd(){
  document.getElementById('popupAdOverlay').classList.remove('show');
}
function clickPopupAd(){
  if(!popupAdCfg||!popupAdCfg.targetUrl)return;
  track('popup_click',popupAdCfg.targetUrl);
  try{
    if(tg&&tg.openLink){tg.openLink(popupAdCfg.targetUrl);}
    else{window.location.href=popupAdCfg.targetUrl;}
  }catch(e){window.location.href=popupAdCfg.targetUrl;}
  closePopupAd();
}
initPopupAd();

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const toDZD=u=>{if(!u)return'';const n=parseFloat(u);return isNaN(n)?'':(Math.round(n*DZD)).toLocaleString('ar-DZ')+' دج'};
const toStars=r=>{if(!r)return'';const n=Math.round(parseFloat(r)/20);return'★'.repeat(n)+'☆'.repeat(5-n)};
const toast=(m,t)=>{const el=document.getElementById('toast');el.textContent=m;el.className='toast show'+(t?' '+t:'');setTimeout(()=>el.className='toast',2500)};

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active')}

// ===== HOME: SAVED POSTS =====
let savedProducts=[];
async function loadSaved(){
  try{
    const r=await fetch('/api/saved-posts');
    const d=await r.json();
    savedProducts=d.posts||[];
    const grid=document.getElementById('savedGrid');
    document.getElementById('savedBadge').textContent=savedProducts.length+' منشور';
    if(!savedProducts.length){
      grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--muted)"><i class="fas fa-box-open" style="font-size:40px;display:block;margin-bottom:10px;opacity:.2;color:var(--pri)"></i><p>لا توجد منتجات محفوظة بعد</p><p style="font-size:11px;margin-top:4px">ابدأ بنشر منتجات من بوت التجسس</p></div>';
      return;
    }
    grid.innerHTML=savedProducts.map((p,i)=>{
      const rawPrice=p.price||'';
      const isDZD=/دج|DZD/i.test(rawPrice);
      let displayPrice=rawPrice.replace(/[^\d.,]/g,'').replace(',','.');
      if(isDZD&&displayPrice){displayPrice=(parseFloat(displayPrice)/DZD).toFixed(2)}
      return cardHTML({
        title:p.title,
        image_url:p.image,
        price:displayPrice,
        _rawPrice:rawPrice,
        currency:'USD',
        promotion_link:p.link,
        product_url:p.link,
        rating:p.rating||null,
        orders:p.orders||null,
        discount:p.discount||null,
        _savedIdx:i,_saved:true
      },i,savedProducts.length);
    }).join('');
    enrichSavedProducts();
  }catch(e){document.getElementById('savedGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--muted)">تعذر التحميل</div>'}
}

function cardHTML(p,i,total){
  const isNew=i<2&&total>2;
  const ratingRaw=p.rating!=null&&p.rating!==''?p.rating:null;
  const ordersRaw=p.orders!=null&&p.orders!==''?p.orders:null;
  const discountRaw=p.discount!=null&&p.discount!==''?p.discount:null;
  const ratingVal=ratingRaw?(Math.round(parseFloat(ratingRaw)/20*10)/10):null;
  const disc=discountRaw?(/%/.test(String(discountRaw))?String(discountRaw):parseInt(discountRaw)+'%'):'';
  const priceVal=p.price||p.sale_price||'';
  const onclickData=p._saved?`openSaved(savedProducts[${p._savedIdx}])`:`openDet(curProducts[${i}])`;
  const buyOnclick=p._saved?`event.stopPropagation();buySaved(savedProducts[${p._savedIdx}])`:`event.stopPropagation();quickBuy(curProducts[${i}])`;
  const showPrice=priceVal?`<div class="pcard-price"><span class="cur">USD</span> ${esc(priceVal)}</div>`:'';
  const origPrice=p.original_price&&p.original_price!==priceVal?`<div class="pcard-orig">${esc(p.original_price)} USD</div>`:'';
  return`<div class="pcard" onclick="${onclickData}">
    <div class="pcard-img-wrap">
      ${p.image_url?`<img class="pcard-img" src="${esc(p.image_url)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
      <div class="no-img" style="display:${p.image_url?'none':'flex'}"><i class="fas fa-image"></i></div>
      ${disc?`<span class="badge-disc">-${disc}</span>`:''}
      ${isNew?`<span class="badge-top">✨ جديد</span>`:''}
    </div>
    <div class="pcard-body">
      <div class="pcard-title">${esc(p.title||'منتج')}</div>
      <div>${showPrice}${origPrice}</div>
      ${(ratingVal||ordersRaw)?`<div class="pcard-meta">${ratingVal?`<span class="pcard-stars">${toStars(ratingRaw)}</span>`:''}${ordersRaw?`<span class="pcard-orders">${Number(ordersRaw).toLocaleString()} طلب</span>`:''}</div>`:''}
      <button class="pcard-buy" onclick="${buyOnclick}"><i class="fas fa-shopping-cart"></i> اشتري الآن</button>
    </div>
  </div>`;
}

function extractProductId(link){
  if(!link)return null;
  const m=link.match(/\/(\d{8,15})\b/)||link.match(/productId[=:](\d+)/i)||link.match(/item\/(\d+)/);
  return m?m[1]:null;
}

async function enrichSavedProducts(){
  const ids=[];
  savedProducts.forEach((p,i)=>{
    if(!p._enriched){
      const pid=extractProductId(p.link);
      if(pid)ids.push({idx:i,pid});
    }
  });
  if(!ids.length)return;
  const batchIds=ids.slice(0,10).map(x=>x.pid).join(',');
  try{
    const r=await fetch('/api/store/product-info?ids='+encodeURIComponent(batchIds));
    if(!r.ok)return;
    const d=await r.json();
    if(!d.success||!d.products)return;
    const map={};
    d.products.forEach(p=>{map[p.id]=p});
    let changed=false;
    ids.slice(0,10).forEach(({idx,pid})=>{
      const info=map[pid];
      if(info){
        savedProducts[idx].rating=info.rating;
        savedProducts[idx].orders=info.orders;
        savedProducts[idx].discount=info.discount;
        savedProducts[idx].apiPrice=info.price;
        savedProducts[idx]._enriched=true;
        changed=true;
      }
    });
    if(changed){
      const grid=document.getElementById('savedGrid');
      grid.innerHTML=savedProducts.map((p,i)=>{
        const rawPrice=p.price||'';
        const isDZD=/دج|DZD/i.test(rawPrice);

function startCoupCountdown(){
  if(window._coupTimer)return;
  const target=new Date();
  target.setHours(23,59,59,0);
  const tick=()=>{
    const el=document.getElementById('coupCountdown');
    if(!el)return;
    const now=new Date();
    let diff=target-now;
    if(diff<=0){target.setDate(target.getDate()+1);diff=target-now}
    const h=String(Math.floor(diff/3600000)).padStart(2,'0');
    const m=String(Math.floor(diff/60000)%60).padStart(2,'0');
    const s=String(Math.floor(diff/1000)%60).padStart(2,'0');
    el.innerHTML=`<b>${h}:${m}:${s}</b>`;
  };
  tick();window._coupTimer=setInterval(tick,1000);
}

function copyCouponCode(code,id,btn){
  if(!code)return;
  try{
    navigator.clipboard.writeText(code).then(()=>{
      track('click','coupon:'+id);
      const orig=btn.textContent;
      btn.textContent='✓ تم النسخ';
      btn.style.background='#16a34a';
      setTimeout(()=>{btn.textContent=orig;btn.style.background=''},1500);
    });
  }catch(e){
    const t=document.createElement('input');
    t.value=code;document.body.appendChild(t);t.select();
    try{document.execCommand('copy')}catch(e){}
    document.body.removeChild(t);
    btn.textContent='✓ تم النسخ';
    setTimeout(()=>{btn.textContent='Copy'},1500);
  }
}

  try{

      grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--muted)"><i class="fas fa-search" style="font-size:40px;display:block;margin-bottom:10px;opacity:.2;color:var(--pri)"></i><h3>لا توجد نتائج</h3><p>جرب كلمة بحث أخرى</p></div>';
    }else{

  isLoading=false;
}

// ===== Helpers: format rating/orders/discount intelligently =====
function fmtRating(r){
  if(r==null||r==='')return '—';
  let n=parseFloat(String(r).replace('%',''));
  if(isNaN(n))return '—';
  // قد يأتي التقييم بصيغة % (0-100) أو مقياس 5 نجوم مباشرة
  if(n>5) n=n/20; // % to 5-star
  if(n>5) n=5;
  return n.toFixed(1)+' ★';
}
function fmtOrders(o){
  if(o==null||o==='')return '—';
  const n=Number(o);
  if(isNaN(n)||n===0)return '—';
  if(n>=1000) return (n/1000).toFixed(n>=10000?0:1)+'k';
  return n.toLocaleString('en-US');
}
function fmtDiscount(d,orig,sale){
  // 1) إذا الـ API أعطى نسبة → استخدمها
  if(d!=null&&d!==''){
    const s=String(d);
    if(/%/.test(s))return s;
    const n=parseInt(s);
    if(!isNaN(n)&&n>0)return n+'%';
  }
  // 2) احسب من السعرين إذا كانا متوفرين
  const o=parseFloat(String(orig||'').replace(/[^\d.]/g,''));
  const sv=parseFloat(String(sale||'').replace(/[^\d.]/g,''));
  if(o>0&&sv>0&&sv<o){
    return Math.round((1-sv/o)*100)+'%';
  }
  return '—';
}

async function enrichProductInfo(pid){
  try{
    const r=await fetch('/api/store/product-info?ids='+encodeURIComponent(pid));
    const d=await r.json();
    const info=d.products&&d.products[0];
    if(!info||!curProduct||String(curProduct.id)!==String(pid))return;
    if(info.rating&&!curProduct.rating)curProduct.rating=info.rating;
    if(info.orders&&!curProduct.orders)curProduct.orders=info.orders;
    if(info.discount&&!curProduct.discount)curProduct.discount=info.discount;
    if(info.original_price&&!curProduct.original_price)curProduct.original_price=info.original_price;
    if(info.shop_name&&!curProduct.shop_name)curProduct.shop_name=info.shop_name;
    // حدّث الواجهة فقط إذا النافذة لا تزال مفتوحة على نفس المنتج

      if(curProduct.shop_name){
        document.getElementById('detShop').style.display='flex';
        document.getElementById('detShopName').textContent=curProduct.shop_name;

  }catch(e){}
}
